name: Keep webhook-service alive

# Render's free tier spins the service down after ~15 minutes idle. Nomba support
# has confirmed directly that a webhook delivered while the receiving endpoint is
# asleep is simply lost — no retry-from-their-side rescues it. This workflow pings
# the process-alive /health route (never touches the DB — see ARCHITECTURE.md
# Section 9) often enough that the service never gets a chance to go to sleep.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 15 https://paybook.onrender.com/health)
          echo "health check returned HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::warning::webhook-service health check failed with HTTP $code"
          fi
