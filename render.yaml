services:
  - type: web
    name: paybook-webhook
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run db:generate --workspace=@paybook/db && npm run build --workspace=@paybook/webhook-service
    startCommand: npm run start --workspace=@paybook/webhook-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: NOMBA_WEBHOOK_SECRET
        sync: false
